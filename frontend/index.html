<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>casahunt</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app">
      <header>
        <h1>casahunt</h1>
        <p class="sub">Real estate alerts for Barcelona</p>
      </header>

      <section id="auth" hidden>
        <h2>Sign in</h2>
        <label>
          Telegram chat id
          <input id="chat-id" type="number" inputmode="numeric" />
        </label>
        <button id="send-code">Send code</button>

        <label>
          Code from Telegram
          <input id="code" type="text" inputmode="numeric" maxlength="6" />
        </label>
        <button id="verify-code">Verify</button>
        <p id="auth-msg" class="msg"></p>
      </section>

      <section id="filters" hidden>
        <div class="filters-head">
          <h2>Your filters</h2>
          <div class="spacer"></div>
          <button id="add-filter">+ New filter</button>
          <button id="sign-out" class="secondary">Sign out</button>
        </div>
        <div id="filters-list"></div>
      </section>
    </main>

    <!-- Edit dialog (native <dialog>) -->
    <dialog id="edit-dialog">
      <form id="edit-form" method="dialog">
        <header class="dlg-head">
          <h3 id="dlg-title">Edit filter</h3>
          <button type="button" class="icon-btn" data-act="close" aria-label="Close">×</button>
        </header>

        <div class="dlg-grid">
          <label class="full">
            Name
            <input name="name" type="text" required />
          </label>

          <label>
            City
            <input name="city" type="text" value="barcelona" />
          </label>

          <label>
            Enabled
            <input name="enabled" type="checkbox" />
          </label>

          <fieldset class="full">
            <legend>Sources</legend>
            <label class="inline"><input type="checkbox" name="sources" value="idealista" /> Idealista</label>
            <label class="inline"><input type="checkbox" name="sources" value="fotocasa" /> Fotocasa</label>
          </fieldset>

          <label>Price min (€) <input name="price_min" type="number" min="0" /></label>
          <label>Price max (€) <input name="price_max" type="number" min="0" /></label>
          <label>Rooms min <input name="rooms_min" type="number" min="0" /></label>
          <label>Rooms max <input name="rooms_max" type="number" min="0" /></label>
          <label>Size min (m²) <input name="size_min_m2" type="number" min="0" /></label>
          <label>Size max (m²) <input name="size_max_m2" type="number" min="0" /></label>

          <div class="full">
            <label>Neighborhoods</label>
            <div id="nb-picker" class="nb-picker">
              <div id="nb-chips" class="nb-chips"></div>
              <input id="nb-search" type="text" placeholder="Type to search…" autocomplete="off" />
              <ul id="nb-results" class="nb-results" hidden></ul>
            </div>
            <p class="msg">Leave empty to match the whole city.</p>
          </div>
        </div>

        <p id="dlg-msg" class="msg"></p>

        <footer class="dlg-foot">
          <button type="button" data-act="close" class="secondary">Cancel</button>
          <button type="submit" data-act="save">Save</button>
        </footer>
      </form>
    </dialog>

    <script type="module" src="./app.js"></script>
  </body>
</html>
