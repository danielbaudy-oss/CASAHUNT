<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>casahunt</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app">
      <header>
        <h1>casahunt</h1>
        <p class="sub">Real estate alerts for Barcelona</p>
      </header>

      <section id="auth" hidden>
        <h2>Sign in</h2>
        <label>
          Telegram chat id
          <input id="chat-id" type="number" inputmode="numeric" />
        </label>
        <button id="send-code">Send code</button>

        <label>
          Code from Telegram
          <input id="code" type="text" inputmode="numeric" maxlength="6" />
        </label>
        <button id="verify-code">Verify</button>
        <p id="auth-msg" class="msg"></p>
      </section>

      <section id="filters" hidden>
        <div class="filters-head">
          <h2>Your filters</h2>
          <div class="spacer"></div>
          <button id="add-filter">+ New filter</button>
          <button id="sign-out" class="secondary">Sign out</button>
        </div>
        <div id="filters-list"></div>
      </section>
    </main>

    <dialog id="edit-dialog">
      <form id="edit-form" method="dialog">
        <header class="dlg-head">
          <h3 id="dlg-title">Edit filter</h3>
          <button type="button" class="icon-btn" data-act="close" aria-label="Close">×</button>
        </header>

        <div class="dlg-body">
          <div class="dlg-grid">
            <label class="full">
              <span>Name</span>
              <input name="name" type="text" required />
            </label>

            <label>
              <span>City</span>
              <input name="city" type="text" value="barcelona" />
            </label>

            <label class="switch-row">
              <span>Enabled</span>
              <input name="enabled" type="checkbox" />
            </label>

            <fieldset class="full">
              <legend>Sources</legend>
              <label class="chip-toggle"><input type="checkbox" name="sources" value="idealista" /><span>Idealista</span></label>
              <label class="chip-toggle"><input type="checkbox" name="sources" value="fotocasa" /><span>Fotocasa</span></label>
            </fieldset>

            <label><span>Price min (€)</span><input name="price_min" type="number" min="0" /></label>
            <label><span>Price max (€)</span><input name="price_max" type="number" min="0" /></label>
            <label><span>Rooms min</span><input name="rooms_min" type="number" min="0" /></label>
            <label><span>Rooms max</span><input name="rooms_max" type="number" min="0" /></label>
            <label><span>Size min (m²)</span><input name="size_min_m2" type="number" min="0" /></label>
            <label><span>Size max (m²)</span><input name="size_max_m2" type="number" min="0" /></label>

            <div class="full nb-block">
              <div class="nb-head">
                <label class="nb-label"><span>Neighborhoods</span></label>
                <input id="nb-filter" type="text" placeholder="Filter…" autocomplete="off" />
                <span id="nb-count" class="msg"></span>
              </div>
              <div id="nb-tree" class="nb-tree"></div>
              <p class="msg">Leave empty to match the whole city.</p>
            </div>
          </div>
        </div>

        <footer class="dlg-foot">
          <p id="dlg-msg" class="msg"></p>
          <button type="button" data-act="close" class="secondary">Cancel</button>
          <button type="submit" data-act="save">Save</button>
        </footer>
      </form>
    </dialog>

    <script type="module" src="./app.js"></script>
  </body>
</html>
